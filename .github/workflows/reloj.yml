name: Publicar Imagen en GitHub Packages

on:
  push:
    branches: [ "main", "master" ]

# Permisos necesarios para poder inyectar el paquete en tu perfil
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    # 1. Inicia sesión en el contenedor de GitHub usando el Token automático
    - name: Iniciar sesion en GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: victor1997h
        password: ${{ secrets.GITHUB_TOKEN }}

    # 2. Construye y publica la imagen directamente a tus Packages usando tu usuario
    - name: Construir y subir imagen a GitHub Packages
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/victor1997h/app-reloj:latest