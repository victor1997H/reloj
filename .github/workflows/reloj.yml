name: Integracion Continua - Reloj Flask

# El flujo se ejecuta cada vez que haces un "push" a la rama principal
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código de tu repositorio en el servidor de GitHub
    - name: Descargar codigo
      uses: actions/checkout@v4

    # 2. Configura el entorno de Python
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3. Instala Flask usando tu requirements.txt global
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Prueba que el contenedor de Docker se construya sin errores
    - name: Validar construccion de Docker
      run: |
        docker build -t app-reloj:latest .